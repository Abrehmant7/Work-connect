<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Portal{% endblock %}</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-soft: #eef3f7;
            --text: #17212b;
            --muted: #667085;
            --line: #d9e0e8;
            --brand: #255f85;
            --brand-dark: #163e5b;
            --accent: #f4a261;
            --danger: #c2413b;
            --shadow: 0 14px 30px rgba(23, 33, 43, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 2px 12px rgba(23, 33, 43, 0.05);
        }

        .nav-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            flex-wrap: wrap;
        }

        .brand {
            color: var(--brand-dark);
            font-weight: 800;
            font-size: 20px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: var(--surface-soft);
            color: var(--brand-dark);
            text-decoration: none;
        }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        h1, h2, h3 {
            margin-top: 0;
            line-height: 1.2;
        }

        a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            color: var(--brand-dark);
            text-decoration: underline;
        }

        .page-header {
            background: linear-gradient(135deg, #163e5b, #255f85);
            color: white;
            border-radius: 8px;
            padding: 26px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        .page-header p {
            color: rgba(255, 255, 255, 0.82);
            margin: 8px 0 0;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 18px 0 26px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .card,
        form,
        .detail-panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .card {
            padding: 18px;
        }

        .card h2,
        .card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
            margin: 4px 0;
        }

        .amount {
            color: var(--brand-dark);
            font-weight: 800;
            font-size: 18px;
            margin: 12px 0 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            background: #e8f2fb;
            color: var(--brand-dark);
        }

        .badge-muted {
            background: var(--surface-soft);
            color: var(--muted);
        }

        .empty-state {
            background: var(--surface);
            border: 1px dashed var(--line);
            border-radius: 8px;
            padding: 22px;
            color: var(--muted);
        }

        form {
            padding: 22px;
            max-width: 720px;
        }

        .field_container,
        form > div {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 800;
            margin-bottom: 6px;
        }

        input,
        select,
        textarea {
            width: 100%;
            max-width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: white;
            color: var(--text);
        }

        textarea {
            min-height: 130px;
        }

        button,
        input[type="submit"],
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--brand);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 800;
            text-decoration: none;
        }

        button:hover,
        input[type="submit"]:hover,
        .button:hover {
            background: var(--brand-dark);
            color: white;
            text-decoration: none;
        }

        .button-secondary {
            background: var(--surface-soft);
            color: var(--brand-dark);
        }

        .button-secondary:hover {
            background: #dde8ed;
            color: var(--brand-dark);
        }

        .detail-panel {
            padding: 24px;
            margin-bottom: 20px;
        }

        .detail-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 18px 0;
        }

        .detail-item {
            background: var(--surface-soft);
            border-radius: 8px;
            padding: 14px;
        }

        .detail-item strong {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            padding: 0;
            margin: 12px 0;
        }

        .skill-list li {
            background: #fff4e8;
            color: #8a4f17;
            border-radius: 999px;
            padding: 5px 10px;
            font-weight: 700;
            font-size: 13px;
        }

        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 20px;
        }

        .messages li {
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: white;
            font-weight: 800;
        }

        .messages li.success {
            background-color: #146c63;
        }

        .messages li.error {
            background-color: var(--danger);
        }

        .messages li.info {
            background-color: #2563eb;
        }

        .messages li.warning {
            background-color: var(--accent);
            color: #3b2b16;
        }

        @media (max-width: 700px) {
            .container {
                width: min(100% - 22px, 1180px);
                padding-top: 18px;
            }

            .page-header {
                padding: 20px;
            }
        }
    </style>
    {% block style %} {% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="brand">JobPortal</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'my_applications' %}">Applications</a>
                    <a href="{% url 'my_proposals' %}">Proposals</a>
                    <a href="{% url 'applicant_profile' %}">Profile</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'sign_up' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
